openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Sign Takeoff Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: jobs
    description: Sign takeoff job operations
  - name: knowledge
    description: RAG knowledge base operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /upload:
    post:
      operationId: uploadFiles
      tags: [jobs]
      summary: Upload PDF plan files
      description: Upload one or more PDF plan files to create a new extraction job
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
              required:
                - files
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}/process:
    post:
      operationId: processJob
      tags: [jobs]
      summary: Process a job with Gemini extraction
      description: Trigger Gemini AI extraction for all files in a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Processing started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job status and results
      description: Returns the job status, file list, and extracted sign data
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetails"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}/export:
    get:
      operationId: exportJob
      tags: [jobs]
      summary: Export job results to XLSX
      description: Download extraction results as a formatted Excel file
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: XLSX file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "404":
          description: Job not found or no results yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all jobs
      description: Returns all jobs ordered by creation date descending
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobSummary"
                required:
                  - jobs

  /jobs/{jobId}/extract-plaque-schedule:
    post:
      operationId: extractPlaqueSchedule
      tags: [jobs]
      summary: Extract plaque schedule from job PDFs
      description: Scans the job's PDF files to find signage/plaque schedules, renders them, and uses AI to extract plaque type specifications.
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Plaque schedule extracted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractPlaqueScheduleResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Extraction failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}/plaque-schedule/{id}:
    delete:
      operationId: deletePlaqueScheduleRow
      tags: [jobs]
      summary: Delete a single plaque schedule row
      description: Permanently removes a single plaque type row from the job's plaque schedule by its ID.
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Row deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "404":
          description: Job or plaque row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Deletion failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}/plaque-schedule:
    get:
      operationId: getPlaqueSchedule
      tags: [jobs]
      summary: Get plaque schedule for a job
      description: Returns the stored plaque schedule data extracted from the job's PDF files.
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Plaque schedule data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaqueScheduleResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}/extract-occupant-loads:
    post:
      operationId: extractOccupantLoads
      tags: [jobs]
      summary: Extract occupant loads from job PDFs
      description: Scans egress/life-safety drawings for occupant load tables, extracts room-level occupancy data, and identifies assembly rooms (occupant load >= 50).
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Occupant loads extracted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractOccupantLoadsResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Extraction failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}/occupant-loads:
    get:
      operationId: getOccupantLoads
      tags: [jobs]
      summary: Get occupant loads for a job
      description: Returns stored occupant load data and a list of identified assembly rooms.
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Occupant loads data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OccupantLoadsResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /knowledge/ingest:
    post:
      operationId: ingestKnowledge
      tags: [knowledge]
      summary: Ingest knowledge files into ChromaDB
      description: Reads knowledge files from the knowledge directory, generates embeddings, and stores them in ChromaDB. Optionally filter by collection name or specific file path.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeIngestRequest"
      responses:
        "200":
          description: Ingestion results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeIngestResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Ingestion failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /knowledge/query:
    post:
      operationId: queryKnowledge
      tags: [knowledge]
      summary: Query the knowledge base
      description: Performs semantic search against ChromaDB collections using text-embedding-004 embeddings. Returns ranked results with citations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeQueryRequest"
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeQueryResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Query failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UploadResponse:
      type: object
      properties:
        jobId:
          type: string
          format: uuid
        fileCount:
          type: integer
        message:
          type: string
      required:
        - jobId
        - fileCount
        - message

    ProcessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        extractedCount:
          type: integer
        status:
          type: string
          enum: [pending, processing, completed, failed]
      required:
        - success
        - message

    JobSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
          description: Human-readable job name (editable by the user)
        status:
          type: string
          enum: [pending, processing, completed, failed]
        fileCount:
          type: integer
        error:
          type: string
          nullable: true
        inputTokens:
          type: integer
          description: Total Gemini input tokens consumed during extraction
        outputTokens:
          type: integer
          description: Total Gemini output tokens consumed during extraction
        projectAddress:
          type: string
          nullable: true
          description: Street address extracted from the plan title block
        projectCity:
          type: string
          nullable: true
          description: City extracted from the plan title block
        projectState:
          type: string
          nullable: true
          description: 2-letter state code extracted from the plan (e.g. CA, TX, NY)
        plaqueCount:
          type: integer
          description: Number of plaque schedule entries extracted for this job
        occupantLoadCount:
          type: integer
          description: Number of occupant load entries extracted for this job
        unplacedCount:
          type: integer
          description: Number of signs with no floor-plan placement (pageNumber is null)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - status
        - fileCount
        - inputTokens
        - outputTokens
        - createdAt
        - updatedAt

    PdfOutlineSection:
      type: object
      properties:
        title:
          type: string
          description: Bookmark / outline item title
        pageStart:
          type: integer
          description: First page of this section (1-indexed)
        pageEnd:
          type: integer
          description: Last page of this section (1-indexed, inclusive)
        type:
          type: string
          nullable: true
          enum: [floor_plan, sign_schedule, other]
          description: Classified type of this outline section
      required:
        - title
        - pageStart
        - pageEnd
        - type

    PageStats:
      type: object
      properties:
        floorPlanPages:
          type: array
          items:
            type: integer
          description: PDF page numbers classified as floor plans
        signSchedulePages:
          type: array
          items:
            type: integer
          description: PDF page numbers classified as sign schedules or sign specs
        otherPages:
          type: array
          items:
            type: integer
          description: PDF page numbers not matching floor plan or sign schedule patterns
        bothPages:
          type: array
          items:
            type: integer
          description: PDF page numbers classified as both floor plan and sign schedule
        pageLabels:
          type: array
          nullable: true
          items:
            type: string
            nullable: true
          description: PDF logical page labels (e.g. "A1.1") indexed by page number (0-based)
        outlineSections:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/PdfOutlineSection'
          description: Top-level PDF outline (bookmark) sections with classified page ranges
        rejectedPageNumbers:
          type: array
          nullable: true
          items:
            type: integer
          description: PDF page numbers explicitly rejected by the user from their classification
        pageImagePaths:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Map of page number (as string key) to server-relative path of pre-rendered PNG image (resolved server-side; not exposed to clients)
      required:
        - floorPlanPages
        - signSchedulePages
        - otherPages

    JobFile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        originalName:
          type: string
        pageCount:
          type: integer
          nullable: true
        pageStats:
          $ref: '#/components/schemas/PageStats'
          nullable: true
          description: Per-page classification breakdown from the extraction pass
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - originalName
        - createdAt

    ExtractedSign:
      type: object
      properties:
        id:
          type: string
          format: uuid
        jobId:
          type: string
          format: uuid
          nullable: true
          description: Job this sign belongs to
        jobFileId:
          type: string
          format: uuid
          nullable: true
        sheetNumber:
          type: string
          nullable: true
        detailReference:
          type: string
          nullable: true
        signType:
          type: string
          nullable: true
        signIdentifier:
          type: string
          nullable: true
        quantity:
          type: integer
          nullable: true
        location:
          type: string
          nullable: true
        dimensions:
          type: string
          nullable: true
        mountingType:
          type: string
          nullable: true
        finishColor:
          type: string
          nullable: true
        illumination:
          type: string
          nullable: true
        materials:
          type: string
          nullable: true
        messageContent:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        confidenceScore:
          type: number
          minimum: 0
          maximum: 1
        reviewFlag:
          type: boolean
        exceptionReason:
          type: string
          nullable: true
          description: Reason this sign was flagged as an exception (set when reviewFlag is true and AI found an exception condition)
        extractionMethod:
          type: string
          nullable: true
          description: 'How this sign was extracted: "text" for text-based extraction, "image" for visual/AI bbox detection'
        pairedSignId:
          type: string
          format: uuid
          nullable: true
          description: ID of the paired text sign when this is the image-only counterpart (or vice versa)
        manuallyAdded:
          type: boolean
          description: True if this sign was manually placed by the user (not AI-extracted)
        manuallyEdited:
          type: boolean
          nullable: true
          description: True if the user has manually edited this sign; protected from AI re-run overwrites
        userVerified:
          type: boolean
          description: True if the user has saved/confirmed this sign entry; preserved across re-extractions
        pageNumber:
          type: integer
          nullable: true
          description: PDF page number where this sign is placed (1-indexed); null means unplaced
        xPos:
          type: number
          nullable: true
          description: Horizontal position on the page (0–1 fraction)
        yPos:
          type: number
          nullable: true
          description: Vertical position on the page (0–1 fraction)
        placementSource:
          type: string
          nullable: true
          description: 'How the sign was placed: "pdf" = auto, "ai" = AI-detected, "manual" = user-placed'
        dataSource:
          type: string
          enum: [pdf, ai, manual]
          nullable: true
          description: Data source classification
        aiBbox:
          type: boolean
          nullable: true
          description: Whether AI bounding box was used for placement
        aiBboxX:
          type: number
          nullable: true
          description: AI bounding box X coordinate (fraction)
        aiBboxY:
          type: number
          nullable: true
          description: AI bounding box Y coordinate (fraction)
        aiBboxW:
          type: number
          nullable: true
          description: AI bounding box width (fraction)
        aiBboxH:
          type: number
          nullable: true
          description: AI bounding box height (fraction)
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - confidenceScore
        - reviewFlag
        - createdAt

    JobDetails:
      type: object
      properties:
        job:
          $ref: "#/components/schemas/JobSummary"
        files:
          type: array
          items:
            $ref: "#/components/schemas/JobFile"
        extractedSigns:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedSign"
        totalSigns:
          type: integer
        flaggedCount:
          type: integer
        highConfidenceCount:
          type: integer
        plaqueCount:
          type: integer
        occupantLoadCount:
          type: integer
      required:
        - job
        - files
        - extractedSigns
        - totalSigns
        - flaggedCount
        - highConfidenceCount
        - plaqueCount
        - occupantLoadCount

    KnowledgeIngestRequest:
      type: object
      properties:
        collection:
          type: string
          enum: [federal_codes, state_codes, city_codes, sign_glossary, plan_guides, customer_standards]
          nullable: true
        file_path:
          type: string
          nullable: true
          description: Optional specific file path to ingest (relative to knowledge directory)

    KnowledgeIngestFileResult:
      type: object
      properties:
        file:
          type: string
        chunksAdded:
          type: integer
        errors:
          type: array
          items:
            type: string
      required:
        - file
        - chunksAdded
        - errors

    KnowledgeIngestResponse:
      type: object
      properties:
        success:
          type: boolean
        totalChunksAdded:
          type: integer
        fileCount:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeIngestFileResult"
      required:
        - success
        - totalChunksAdded
        - fileCount
        - results

    KnowledgeQueryRequest:
      type: object
      properties:
        text:
          type: string
          description: The query text for semantic search
        nResults:
          type: integer
          default: 5
          description: Maximum number of results to return
        jurisdiction:
          type: string
          nullable: true
          description: Filter results by jurisdiction (e.g. "federal", "CA", "Los Angeles, CA")
        doc_type:
          oneOf:
            - type: string
              enum: [federal_codes, state_codes, city_codes, sign_glossary, plan_guides, customer_standards]
            - type: array
              items:
                type: string
                enum: [federal_codes, state_codes, city_codes, sign_glossary, plan_guides, customer_standards]
          nullable: true
          description: Filter results by collection type(s)
      required:
        - text

    KnowledgeResultMetadata:
      type: object
      properties:
        source_file:
          type: string
        jurisdiction:
          type: string
        doc_type:
          type: string
        section:
          type: string
        effective_date:
          type: string
        status:
          type: string
        chunk_index:
          type: integer
          nullable: true
      required:
        - source_file
        - jurisdiction
        - doc_type
        - section
        - effective_date
        - status

    KnowledgeResult:
      type: object
      properties:
        id:
          type: string
        document:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 1
        metadata:
          $ref: "#/components/schemas/KnowledgeResultMetadata"
      required:
        - id
        - document
        - score
        - metadata

    KnowledgeQueryResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeResult"
        citations:
          type: array
          items:
            type: string
        totalResults:
          type: integer
      required:
        - results
        - citations
        - totalResults

    PlaqueScheduleEntry:
      type: object
      description: A single plaque type extracted from the sign schedule
      properties:
        id:
          type: string
          format: uuid
        jobId:
          type: string
          format: uuid
        typeId:
          type: string
          description: Plaque type identifier (e.g. "P1", "P2")
        name:
          type: string
          nullable: true
          description: Descriptive name of the plaque type
        braille:
          type: boolean
          nullable: true
          description: Whether the plaque requires Braille
        insert:
          type: boolean
          nullable: true
          description: Whether the plaque has an insert
        insertSize:
          type: string
          nullable: true
          description: Insert size specification
        letterHeight:
          type: string
          nullable: true
          description: Letter height specification
        trigger:
          type: string
          nullable: true
          description: Trigger condition for this plaque type
        mapsToColumn:
          type: string
          nullable: true
          description: Column in the sign schedule this type maps to
        generalNotes:
          type: object
          nullable: true
          additionalProperties: true
          description: General notes associated with this plaque type
        rawJson:
          type: object
          nullable: true
          additionalProperties: true
          description: Raw extracted JSON from AI
        sourcePage:
          type: integer
          nullable: true
          description: PDF page number where this plaque type was found
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - jobId
        - typeId
        - createdAt

    PlaqueScheduleFileDetail:
      type: object
      description: Per-file result from a plaque schedule extraction run
      properties:
        plaqueCount:
          type: integer
          description: Number of plaque types extracted from this file
        sourcePage:
          type: integer
          nullable: true
          description: PDF page number where the plaque schedule was found
        skipped:
          type: boolean
          description: Whether this file was skipped (e.g. no sign schedule pages)
        skipReason:
          type: string
          nullable: true
          description: Reason the file was skipped, if applicable
        inputTokens:
          type: integer
          description: Gemini input tokens consumed for this file
        outputTokens:
          type: integer
          description: Gemini output tokens consumed for this file
      required:
        - plaqueCount
        - skipped
        - inputTokens
        - outputTokens

    ExtractPlaqueScheduleResponse:
      type: object
      description: Result of a plaque schedule extraction run
      properties:
        success:
          type: boolean
        jobId:
          type: string
          format: uuid
        totalPlaques:
          type: integer
          description: Total number of plaque types extracted across all files
        totalInputTokens:
          type: integer
          description: Total Gemini input tokens consumed
        totalOutputTokens:
          type: integer
          description: Total Gemini output tokens consumed
        details:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PlaqueScheduleFileDetail"
          description: Per-file extraction details keyed by file UUID
      required:
        - success
        - jobId
        - totalPlaques
        - totalInputTokens
        - totalOutputTokens
        - details

    PlaqueScheduleResponse:
      type: object
      description: Stored plaque schedule data for a job
      properties:
        jobId:
          type: string
          format: uuid
        plaques:
          type: array
          items:
            $ref: "#/components/schemas/PlaqueScheduleEntry"
      required:
        - jobId
        - plaques

    OccupantLoadEntry:
      type: object
      description: A single room's occupant load data extracted from egress drawings
      properties:
        id:
          type: string
          format: uuid
        jobId:
          type: string
          format: uuid
        roomNum:
          type: string
          description: Room number or identifier
        roomName:
          type: string
          nullable: true
          description: Room name or description
        occupantLoad:
          type: number
          nullable: true
          description: Calculated occupant load for the room
        occupancyGroup:
          type: string
          nullable: true
          description: IBC occupancy group classification (e.g. A-2, B, E)
        sourcePage:
          type: integer
          nullable: true
          description: PDF page number where this occupant load was found
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - jobId
        - roomNum
        - createdAt

    AssemblyRoom:
      type: object
      description: A room identified as an assembly occupancy (occupant load >= 50)
      properties:
        roomNumber:
          type: string
          description: Room number or identifier
        roomName:
          type: string
          nullable: true
          description: Room name or description
        occupantLoad:
          type: number
          description: Occupant load for the room
        occupancyGroup:
          type: string
          nullable: true
          description: IBC occupancy group classification
        isAssembly:
          type: boolean
          description: Always true for assembly rooms
      required:
        - roomNumber
        - occupantLoad
        - isAssembly

    OccupantLoadFileDetail:
      type: object
      description: Per-file result from an occupant loads extraction run
      properties:
        roomCount:
          type: integer
          description: Number of rooms extracted from this file
        sourcePages:
          type: array
          items:
            type: integer
          description: PDF page numbers where occupant load tables were found
        skipped:
          type: boolean
          description: Whether this file was skipped (e.g. no other/egress pages)
        skipReason:
          type: string
          nullable: true
          description: Reason the file was skipped, if applicable
        inputTokens:
          type: integer
          description: Gemini input tokens consumed for this file
        outputTokens:
          type: integer
          description: Gemini output tokens consumed for this file
      required:
        - roomCount
        - sourcePages
        - skipped
        - inputTokens
        - outputTokens

    ExtractOccupantLoadsResponse:
      type: object
      description: Result of an occupant loads extraction run
      properties:
        success:
          type: boolean
        jobId:
          type: string
          format: uuid
        totalRooms:
          type: integer
          description: Total number of rooms extracted across all files
        totalInputTokens:
          type: integer
          description: Total Gemini input tokens consumed
        totalOutputTokens:
          type: integer
          description: Total Gemini output tokens consumed
        assemblyRoomCount:
          type: integer
          description: Number of rooms identified as assembly occupancy
        assemblyRooms:
          type: array
          items:
            $ref: "#/components/schemas/AssemblyRoom"
          description: Rooms identified as assembly occupancy (occupant load >= 50)
        details:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/OccupantLoadFileDetail"
          description: Per-file extraction details keyed by file UUID
      required:
        - success
        - jobId
        - totalRooms
        - totalInputTokens
        - totalOutputTokens
        - assemblyRoomCount
        - assemblyRooms
        - details

    OccupantLoadsResponse:
      type: object
      description: Stored occupant loads data for a job
      properties:
        jobId:
          type: string
          format: uuid
        loads:
          type: array
          items:
            $ref: "#/components/schemas/OccupantLoadEntry"
          description: All occupant load records for the job
        assemblyRooms:
          type: array
          items:
            $ref: "#/components/schemas/AssemblyRoom"
          description: Rooms identified as assembly occupancy
      required:
        - jobId
        - loads
        - assemblyRooms

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
          nullable: true
      required:
        - error
