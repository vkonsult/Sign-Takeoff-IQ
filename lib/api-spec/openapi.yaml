openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Sign Takeoff Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: jobs
    description: Sign takeoff job operations
  - name: knowledge
    description: RAG knowledge base operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /upload:
    post:
      operationId: uploadFiles
      tags: [jobs]
      summary: Upload PDF plan files
      description: Upload one or more PDF plan files to create a new extraction job
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
              required:
                - files
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}/process:
    post:
      operationId: processJob
      tags: [jobs]
      summary: Process a job with Gemini extraction
      description: Trigger Gemini AI extraction for all files in a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Processing started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job status and results
      description: Returns the job status, file list, and extracted sign data
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetails"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}/export:
    get:
      operationId: exportJob
      tags: [jobs]
      summary: Export job results to XLSX
      description: Download extraction results as a formatted Excel file
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: XLSX file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "404":
          description: Job not found or no results yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all jobs
      description: Returns all jobs ordered by creation date descending
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobSummary"
                required:
                  - jobs

  /knowledge/ingest:
    post:
      operationId: ingestKnowledge
      tags: [knowledge]
      summary: Ingest knowledge files into ChromaDB
      description: Reads knowledge files from the knowledge directory, generates embeddings, and stores them in ChromaDB. Optionally filter by collection name or specific file path.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeIngestRequest"
      responses:
        "200":
          description: Ingestion results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeIngestResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Ingestion failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /knowledge/query:
    post:
      operationId: queryKnowledge
      tags: [knowledge]
      summary: Query the knowledge base
      description: Performs semantic search against ChromaDB collections using text-embedding-004 embeddings. Returns ranked results with citations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeQueryRequest"
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeQueryResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Query failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UploadResponse:
      type: object
      properties:
        jobId:
          type: string
          format: uuid
        fileCount:
          type: integer
        message:
          type: string
      required:
        - jobId
        - fileCount
        - message

    ProcessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        extractedCount:
          type: integer
        status:
          type: string
          enum: [pending, processing, completed, failed]
      required:
        - success
        - message

    JobSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, processing, completed, failed]
        fileCount:
          type: integer
        error:
          type: string
          nullable: true
        inputTokens:
          type: integer
          description: Total Gemini input tokens consumed during extraction
        outputTokens:
          type: integer
          description: Total Gemini output tokens consumed during extraction
        projectAddress:
          type: string
          nullable: true
          description: Street address extracted from the plan title block
        projectCity:
          type: string
          nullable: true
          description: City extracted from the plan title block
        projectState:
          type: string
          nullable: true
          description: 2-letter state code extracted from the plan (e.g. CA, TX, NY)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - status
        - fileCount
        - inputTokens
        - outputTokens
        - createdAt
        - updatedAt

    PdfOutlineSection:
      type: object
      properties:
        title:
          type: string
          description: Bookmark / outline item title
        pageStart:
          type: integer
          description: First page of this section (1-indexed)
        pageEnd:
          type: integer
          description: Last page of this section (1-indexed, inclusive)
        type:
          type: string
          nullable: true
          enum: [floor_plan, sign_schedule, other]
          description: Classified type of this outline section
      required:
        - title
        - pageStart
        - pageEnd
        - type

    PageStats:
      type: object
      properties:
        floorPlanPages:
          type: array
          items:
            type: integer
          description: PDF page numbers classified as floor plans
        signSchedulePages:
          type: array
          items:
            type: integer
          description: PDF page numbers classified as sign schedules or sign specs
        otherPages:
          type: array
          items:
            type: integer
          description: PDF page numbers not matching floor plan or sign schedule patterns
        bothPages:
          type: array
          items:
            type: integer
          description: PDF page numbers classified as both floor plan and sign schedule
        pageLabels:
          type: array
          nullable: true
          items:
            type: string
            nullable: true
          description: PDF logical page labels (e.g. "A1.1") indexed by page number (0-based)
        outlineSections:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/PdfOutlineSection'
          description: Top-level PDF outline (bookmark) sections with classified page ranges
        rejectedPageNumbers:
          type: array
          nullable: true
          items:
            type: integer
          description: Page numbers manually rejected by the user and excluded from extraction
        manifestWarnings:
          type: array
          nullable: true
          items:
            type: string
          description: Non-blocking warnings produced during sheet classification (e.g. no floor plan pages found)
        isExcerpt:
          type: boolean
          nullable: true
          description: True when the upload appears to be a plan excerpt with few pages and no bookmarks
        pageImagePaths:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Map of page number (as string key) to server-relative path of pre-rendered PNG image (resolved server-side; not exposed to clients)
      required:
        - floorPlanPages
        - signSchedulePages
        - otherPages

    JobFile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        originalName:
          type: string
        pageCount:
          type: integer
          nullable: true
        pageStats:
          $ref: '#/components/schemas/PageStats'
          nullable: true
          description: Per-page classification breakdown from the extraction pass
        roomInventory:
          type: object
          nullable: true
          description: Phase 4 room inventory — extracted room labels, occupant loads, and derived flags
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - originalName
        - createdAt

    ExtractedSign:
      type: object
      properties:
        id:
          type: string
          format: uuid
        jobFileId:
          type: string
          format: uuid
          nullable: true
        sheetNumber:
          type: string
          nullable: true
        detailReference:
          type: string
          nullable: true
        signType:
          type: string
          nullable: true
        signIdentifier:
          type: string
          nullable: true
        quantity:
          type: integer
          nullable: true
        location:
          type: string
          nullable: true
        dimensions:
          type: string
          nullable: true
        mountingType:
          type: string
          nullable: true
        finishColor:
          type: string
          nullable: true
        illumination:
          type: string
          nullable: true
        materials:
          type: string
          nullable: true
        messageContent:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        confidenceScore:
          type: number
          minimum: 0
          maximum: 1
        reviewFlag:
          type: boolean
        manuallyAdded:
          type: boolean
          description: True if this sign was manually placed by the user (not AI-extracted)
        userVerified:
          type: boolean
          description: True if the user has saved/confirmed this sign entry; preserved across re-extractions
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - confidenceScore
        - reviewFlag
        - createdAt

    JobDetails:
      type: object
      properties:
        job:
          $ref: "#/components/schemas/JobSummary"
        files:
          type: array
          items:
            $ref: "#/components/schemas/JobFile"
        extractedSigns:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedSign"
        totalSigns:
          type: integer
        flaggedCount:
          type: integer
        highConfidenceCount:
          type: integer
      required:
        - job
        - files
        - extractedSigns
        - totalSigns
        - flaggedCount
        - highConfidenceCount

    KnowledgeIngestRequest:
      type: object
      properties:
        collection:
          type: string
          enum: [federal_codes, state_codes, city_codes, sign_glossary, plan_guides, customer_standards]
          nullable: true
        file_path:
          type: string
          nullable: true
          description: Optional specific file path to ingest (relative to knowledge directory)

    KnowledgeIngestFileResult:
      type: object
      properties:
        file:
          type: string
        chunksAdded:
          type: integer
        errors:
          type: array
          items:
            type: string
      required:
        - file
        - chunksAdded
        - errors

    KnowledgeIngestResponse:
      type: object
      properties:
        success:
          type: boolean
        totalChunksAdded:
          type: integer
        fileCount:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeIngestFileResult"
      required:
        - success
        - totalChunksAdded
        - fileCount
        - results

    KnowledgeQueryRequest:
      type: object
      properties:
        text:
          type: string
          description: The query text for semantic search
        nResults:
          type: integer
          default: 5
          description: Maximum number of results to return
        jurisdiction:
          type: string
          nullable: true
          description: Filter results by jurisdiction (e.g. "federal", "CA", "Los Angeles, CA")
        doc_type:
          oneOf:
            - type: string
              enum: [federal_codes, state_codes, city_codes, sign_glossary, plan_guides, customer_standards]
            - type: array
              items:
                type: string
                enum: [federal_codes, state_codes, city_codes, sign_glossary, plan_guides, customer_standards]
          nullable: true
          description: Filter results by collection type(s)
      required:
        - text

    KnowledgeResultMetadata:
      type: object
      properties:
        source_file:
          type: string
        jurisdiction:
          type: string
        doc_type:
          type: string
        section:
          type: string
        effective_date:
          type: string
        status:
          type: string
        chunk_index:
          type: integer
          nullable: true
      required:
        - source_file
        - jurisdiction
        - doc_type
        - section
        - effective_date
        - status

    KnowledgeResult:
      type: object
      properties:
        id:
          type: string
        document:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 1
        metadata:
          $ref: "#/components/schemas/KnowledgeResultMetadata"
      required:
        - id
        - document
        - score
        - metadata

    KnowledgeQueryResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeResult"
        citations:
          type: array
          items:
            type: string
        totalResults:
          type: integer
      required:
        - results
        - citations
        - totalResults

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
          nullable: true
      required:
        - error
